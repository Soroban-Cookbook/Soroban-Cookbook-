name: Deploy Docs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - "book/**"
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"

# Only one deployment runs at a time; in-progress runs on the same branch are cancelled.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build — runs on every push and PR to validate the book compiles
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache mdBook binary
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook
          key: mdbook-${{ env.MDBOOK_VERSION }}

      - name: Install mdBook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          cargo install mdbook --version ${{ env.MDBOOK_VERSION }} --locked

      - name: Build documentation
        working-directory: book
        run: mdbook build

      - name: Upload Pages artifact
        # Only upload on main branch pushes so deploy job can consume it
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book-output

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy — runs only on push to main, after a successful build
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
