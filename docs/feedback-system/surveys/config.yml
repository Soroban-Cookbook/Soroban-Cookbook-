# Survey Configuration
# This file defines survey templates and their parameters

surveys:
  - id: "contributor-satisfaction"
    name: "Contributor Satisfaction Survey"
    description: "Annual survey to measure contributor satisfaction"
    frequency: "yearly"
    questions:
      - id: "q1"
        type: "rating"
        question: "How satisfied are you with the contribution process?"
        scale: 1-5
      - id: "q2"
        type: "multiple-choice"
        question: "What areas need improvement?"
        options:
          - "Documentation"
          - "Code Review Process"
          - "Communication"
          - "Tooling"
      - id: "q3"
        type: "open-ended"
        question: "What would you like to see improved?"

  - id: "user-experience"
    name: "User Experience Survey"
    description: "Quarterly survey for end users"
    frequency: "quarterly"
    questions:
      - id: "q1"
        type: "rating"
        question: "How easy is it to use the cookbook?"
        scale: 1-5
      - id: "q2"
        type: "multiple-choice"
        question: "Which sections do you find most useful?"
        options:
          - "Getting Started"
          - "Tutorials"
          - "API Reference"
          - "Examples"
      - id: "q3"
        type: "open-ended"
        question: "What additional content would you like to see?"

settings:
  default_language: "en"
  response_limit: 1000
  anonymous_allowed: true
  notification_email: "feedback@soroban-cookbook.dev"